<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <title>Cat1</title>
</head>
<body>
  <div class="cat">
    <div class="head">
      <div class="ears">
        <div class="ear-container left">
          <div class="ear border"></div>
          <div class="ear filling"></div>
        </div>
        <div class="ear-container right">
          <div class="ear border"></div>
          <div class="ear filling"></div>
        </div>
      </div>
      <div class="eyes">
        <div class="eye left blink-interval"></div>
        <div class="eye right blink-interval"></div>
      </div>
      <div class="nose"></div>
      <div class="mouth tongue"></div>
      <div class="moustache">
        <div class="left">
        </div>
        <div class="right">
        </div>
      </div>
    </div>
  </div>
